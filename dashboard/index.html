<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet — Parallel Science</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <script>tailwind.config={theme:{extend:{fontFamily:{serif:['EB Garamond','serif'],mono:['JetBrains Mono','monospace']}}}}</script>
</head>
<body class="min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-3xl font-semibold text-white">Mission Control</h1>
                <p class="text-sm text-gray-500 mt-1">Parallel Science Fleet</p>
            </div>
            <div class="text-right text-xs text-gray-600">
                <div id="update-time">Loading...</div>
                <div id="uptime" class="mt-1 text-green-500"></div>
                <div id="mission-cost" class="mt-1"></div>
            </div>
        </div>

        <nav id="nav" class="flex gap-1 mb-8"></nav>

        <div id="fleet-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="card p-6 text-center text-gray-600">Loading fleet status...</div>
        </div>

        <div class="border-t border-gray-800 mt-10 pt-4 text-center text-xs text-gray-600 space-x-4">
            <a href="https://papers.parallelscience.org">Papers</a>
            <span>&middot;</span>
            <a href="https://parallelscience.org">Parallel Science</a>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="shared.js?v=4"></script>
    <script>
    renderNav('fleet');

    function renderFleetCards(scientists) {
        const container = document.getElementById('fleet-cards');
        if (!scientists || scientists.length === 0) {
            container.innerHTML = '<div class="card p-6 text-center text-gray-600">No scientists found</div>';
            return;
        }

        container.innerHTML = scientists.map(sci => {
            const c = sci.container;
            let cardBorder = '';
            if (sci.status === 'busy') cardBorder = 'border-amber-900';
            else if (sci.status === 'error') cardBorder = 'border-red-900';

            let projectsHtml = '';
            if (sci.projects && sci.projects.length > 0) {
                // Show only the most recent project
                const proj = sci.projects.reduce((a, b) =>
                    (a.last_modified || '') >= (b.last_modified || '') ? a : b
                );
                const key = `${sci.name}-${proj.name}`.replace(/[^a-z0-9-]/gi, '_');
                const displayName = proj.title || proj.name;
                const otherCount = sci.projects.length - 1;
                const maxIter = proj.iteration_count > 0 ? proj.iteration_count - 1 : 0;

                // Store project data for iteration navigation (preserves user's selection)
                registerCardProject(key, sci.name, proj);
                const curIter = _cardProjects[key].currentIter;
                const curStages = proj.stages_by_iteration ? proj.stages_by_iteration[curIter] || proj.stages_completed : proj.stages_completed;

                projectsHtml = `<div class="mt-3">
                    <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-200" title="${displayName}">${displayName.length > 60 ? displayName.slice(0, 60) + '...' : displayName}</span>
                        <div class="flex items-center gap-2">
                            ${proj.iteration_count > 1
                                ? `<span class="iter-nav text-xs text-gray-500">
                                    <span class="iter-arrow" onclick="cardIterPrev('${key}')">&larr;</span>
                                    <span id="iter-label-${key}">${curIter}/${maxIter}</span>
                                    <span class="iter-arrow" onclick="cardIterNext('${key}')">&rarr;</span>
                                  </span>`
                                : `<span class="text-xs text-gray-600">${maxIter}/${maxIter}</span>`
                            }
                        </div>
                    </div>
                    ${proj.title ? `<div class="text-xs text-gray-600 mt-0.5">${proj.name}</div>` : ''}
                    ${proj.best_iteration != null && proj.iteration_count > 1 ? `<div class="text-xs mt-0.5"><span class="best-iter-badge">best iter: ${proj.best_iteration}</span></div>` : ''}
                    <div class="mt-1" id="pipeline-${key}">${renderPipelineBar(curStages, (proj.plan_by_iteration && proj.plan_by_iteration[curIter]) || null, sci.status === 'busy' && curIter === maxIter, sci.name, proj.name, proj.iteration_count, curIter)}</div>
                    ${(proj.plan_by_iteration && proj.plan_by_iteration[curIter]) ? renderPlanTable(proj.plan_by_iteration[curIter], key) : ''}
                    ${otherCount > 0 ? `<div class="text-xs text-gray-600 mt-2">+ ${otherCount} other project${otherCount > 1 ? 's' : ''}</div>` : ''}
                </div>`;
            }

            return `<div class="card p-4 ${cardBorder}">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <span class="status-dot ${statusColor(sci.status)}"></span>
                        <span class="text-white font-medium">${sci.name}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        ${sci.status !== 'idle' ? `<span class="text-xs text-gray-500">${statusLabel(sci.status)}</span>` : ''}
                        ${sci.projects && sci.projects.length > 0 && sci.projects.reduce((s, p) => s + ((p.cost && p.cost.total_dollars) || 0), 0) > 0 ? `<span class="cost-badge">Total Cost: ${formatCost(sci.projects.reduce((s, p) => s + ((p.cost && p.cost.total_dollars) || 0), 0))}</span>` : ''}
                    </div>
                </div>

                <div class="space-y-1 mb-3">
                    ${c.running ? renderUsageBar(c.cpu_percent, c.cpus * 100, 'CPU', '%') : ''}
                    ${c.running ? renderUsageBar(c.memory_used_mb, c.memory_limit_mb, 'RAM', 'MB') : ''}
                </div>

                <div class="flex items-center gap-2 text-xs text-gray-500 mb-1">
                    <span>${c.cpus} CPU</span>
                    <span>&middot;</span>
                    <span>${(c.memory_limit_mb / 1024).toFixed(0)} GB</span>
                    ${c.gpu ? `<span>&middot;</span><span class="text-purple-400">${c.gpu}</span>` : ''}
                </div>

                ${projectsHtml || '<div class="text-xs text-gray-600 mt-2">No projects</div>'}
            </div>`;
        }).join('');
    }

    async function loadData() {
        try {
            const data = await fetchStatus();
            renderFleetCards(data.scientists);
            renderUpdateTime(data.timestamp);
            updateFleetUptime(data.scientists);
            updateMissionCost(data.scientists);
        } catch (e) {
            console.error('Failed to load status:', e);
        }
    }

    loadData();
    setInterval(loadData, 10000);
    </script>
</body>
</html>
