<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers — Parallel Science</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <script>tailwind.config={theme:{extend:{fontFamily:{serif:['EB Garamond','serif'],mono:['JetBrains Mono','monospace']}}}}</script>
</head>
<body class="min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-3xl font-semibold text-white">Recent Papers</h1>
                <p class="text-sm text-gray-500 mt-1">Latest 20 completed papers</p>
            </div>
            <div class="text-right text-xs text-gray-600">
                <div id="update-time">Loading...</div>
                <div id="uptime" class="mt-1 text-green-500"></div>
                <div id="mission-cost" class="mt-1"></div>
            </div>
        </div>

        <nav id="nav" class="flex gap-1 mb-8"></nav>

        <div id="papers-list" class="space-y-3">
            <div class="text-gray-600 text-sm">Loading...</div>
        </div>

        <div class="mt-6 text-center">
            <a href="https://papers.parallelscience.org" class="text-sm text-gray-400 hover:text-gray-200">View all papers on papers.parallelscience.org &rarr;</a>
        </div>

        <div class="border-t border-gray-800 mt-10 pt-4 text-center text-xs text-gray-600 space-x-4">
            <a href="https://papers.parallelscience.org">Papers</a>
            <span>&middot;</span>
            <a href="https://parallelscience.org">Parallel Science</a>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="shared.js?v=4"></script>
    <script>
    renderNav('papers');

    function renderPapers(scientists) {
        const container = document.getElementById('papers-list');
        const papers = [];

        for (const sci of (scientists || [])) {
            for (const proj of (sci.projects || [])) {
                if (proj.title && proj.stages_completed.includes('paper')) {
                    papers.push({
                        title: proj.title,
                        scientist: sci.name,
                        project: proj.name,
                        iteration_count: proj.iteration_count,
                        last_modified: proj.last_modified,
                        pages_url: proj.pages_url,
                        github_url: proj.github_url,
                        stages_completed: proj.stages_completed,
                        plan_execution: proj.plan_execution,
                        cost: proj.cost,
                    });
                }
            }
        }

        papers.sort((a, b) => (b.last_modified || '').localeCompare(a.last_modified || ''));
        const shown = papers.slice(0, 20);

        if (shown.length === 0) {
            container.innerHTML = '<div class="text-gray-600 text-sm">No completed papers yet.</div>';
            return;
        }

        container.innerHTML = shown.map(p => {
            const date = p.last_modified ? new Date(p.last_modified).toLocaleDateString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric'
            }) : '';

            let costInfo = '';
            if (p.cost && p.cost.total_dollars > 0) {
                costInfo = `<span class="cost-badge">${formatCost(p.cost.total_dollars)}</span>`;
            }

            return `<div class="card p-4">
                <div class="flex items-start justify-between gap-4">
                    <div class="flex-1 min-w-0">
                        <div class="text-base text-gray-100">${p.title}</div>
                        <div class="text-xs text-gray-500 mt-1">
                            ${p.scientist} &middot; ${p.project} &middot; ${p.iteration_count} iteration${p.iteration_count !== 1 ? 's' : ''} &middot; ${date}
                            ${costInfo}
                        </div>
                    </div>
                    <div class="flex gap-3 flex-shrink-0 pt-1">
                        ${p.pages_url ? `<a href="${p.pages_url}" class="text-lg" title="View paper">📄</a>` : ''}
                        ${p.github_url ? `<a href="${p.github_url}" class="text-lg" title="GitHub repo"><svg class="inline-block w-5 h-5" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');

        if (papers.length > 20) {
            container.innerHTML += `<div class="text-center text-xs text-gray-600 mt-4">Showing 20 of ${papers.length} papers</div>`;
        }
    }

    async function loadData() {
        try {
            const data = await fetchStatus();
            renderPapers(data.scientists);
            renderUpdateTime(data.timestamp);
            updateFleetUptime(data.scientists);
            updateMissionCost(data.scientists);
        } catch (e) {
            console.error('Failed to load status:', e);
        }
    }

    loadData();
    setInterval(loadData, 10000);
    </script>
</body>
</html>
