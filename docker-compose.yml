services:
  denario-1:
    build:
      context: ../openclaw
      dockerfile: ../denario-scientists/Dockerfile
      additional_contexts:
        ag2-src: ../ag2
        cmbagent-src: ../cmbagent
        denario-src: ../Denario
    container_name: denario-1
    environment:
      HOME: /home/node
      TERM: xterm-256color
      SCIENTIST_NAME: denario-1
      OPENCLAW_GATEWAY_TOKEN: ${DENARIO_1_TOKEN:-denario-1-token}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: 1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_ORG: ${GITHUB_ORG:-ParallelScience}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_VOICE_ID: sJKq4p1ljb8oxmfBK2hp
      DENARIO_WORK_DIR: /home/node/work
      TZ: ${TZ:-UTC}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN_1}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN_1}
    volumes:
      - ./scientists/denario-1/config:/home/node/.openclaw
      - ./scientists/denario-1/workspace:/home/node/.openclaw/workspace
      - ./scientists/denario-1/work:/home/node/work
      - ./auto-pair.sh:/app/auto-pair.sh:ro
      - ./entrypoint.sh:/app/entrypoint.sh:ro
      - ./cancel-watcher.py:/app/cancel-watcher.py:ro
      - ./bootstrap:/app/bootstrap:ro
      - ${DATA_DIR:-./data}:/home/node/data:ro
      - ./tools:/home/node/tools:ro
    ports:
      - "18796:18789"
      - "18820:18790"
    cpus: "4"
    mem_limit: 8g
    init: true
    restart: unless-stopped
    command:
      - "sh"
      - "/app/entrypoint.sh"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

